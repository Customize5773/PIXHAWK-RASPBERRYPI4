# Konfigurasi mavlink-router untuk ROV (Pixhawk 2.4.8 <-> Raspberry Pi 4)
#
# Alur: Pixhawk (USB /dev/ttyACM0) -> mavlink-router -> fan-out ke:
#   - QGroundControl topside  (UDP 14550)
#   - Skrip pymavlink lokal   (UDP 14551)
#
# Salin ke: /etc/mavlink-router/main.conf
# Lihat docs/04-mavlink-routing.md untuk detail.

[General]
TcpServerPort=5760
ReportStats=false
MavlinkDialect=common

# --- Sumber MAVLink: Pixhawk 2.4.8 via USB ---
# Ubah Device ke /dev/ttyACM1 bila Pixhawk muncul di port itu.
[UartEndpoint pixhawk]
Device = /dev/ttyACM0
Baud = 115200

# --- Endpoint topside: QGroundControl ---
# GANTI Address dengan IP laptop/PC topside (lihat docs/05-ground-station.md).
[UdpEndpoint qgc]
Mode = Normal
Address = 192.168.2.1
Port = 14550

# --- Endpoint lokal: skrip pymavlink di Raspberry Pi ---
# Skrip contoh connect ke udpin:127.0.0.1:14551
[UdpEndpoint onboard]
Mode = Normal
Address = 127.0.0.1
Port = 14551
